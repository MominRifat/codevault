{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | CodeVault</title>
  <link rel="stylesheet" href="{% static 'core/style.css' %}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="display: block;">

  <div class="auth-container">
    <div class="auth-card">
      
      <!-- Brand Logo -->
      <div class="auth-logo">
        <div class="brand-icon" style="width: 40px; height: 40px; border-radius: 10px;">
          <i data-lucide="cpu" style="width: 22px; height: 22px;"></i>
        </div>
        <span class="brand-text" style="font-size: 1.5rem;">Code<span>Vault</span></span>
      </div>

      <h2 class="auth-title">Welcome Back Creator</h2>
      <p class="auth-subtitle">Sign in to sync your local knowledge vault</p>

      {% if error %}
        <div class="auth-error">
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        
        <div class="form-group">
          <label for="username">Username or Email Address</label>
          <input type="text" name="username" id="username" class="form-control" placeholder="enter your credentials" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Password Key</label>
          <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-weight: 600; font-size: 0.875rem; border-radius: 10px; margin-top: 10px;">
          Authenticate Session
        </button>
      </form>

      <div class="auth-link">
        New creator in town? <a href="{% url 'register' %}">Register Knowledge Vault</a>
      </div>

    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
